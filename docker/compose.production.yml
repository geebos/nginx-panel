name: nginx-panel-production

services:
  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.production
    environment:
      APP_ENV: production
      DB_ENGINE: sqlite
      DB_SQLITE_DIR: /data/db
      MANAGER_HOST: ${MANAGER_HOST:?MANAGER_HOST must be set}
      MANAGER_TLS_CERT_FILE: /run/secrets/manager_tls_cert
      MANAGER_TLS_KEY_FILE: /run/secrets/manager_tls_key
      MANAGER_URL: ${MANAGER_URL:?MANAGER_URL must be set}
      NGINX_LOG_DIR: /data/logs
      PORT: "8787"
      RUNTIME_MODE: nginx-manager
    ports:
      - "80:8080"
      - "443:8443"
    read_only: true
    restart: unless-stopped
    secrets:
      - manager_tls_cert
      - manager_tls_key
      - nginx_manager_master_key
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    stop_grace_period: 30s
    tmpfs:
      - /run/nginx:uid=10001,gid=10001,mode=0750
      - /tmp:uid=10001,gid=10001,mode=1770
    volumes:
      - sqlite_data:/data/db
      - nginx_data:/data/nginx
      - certificate_data:/data/certs
      - acme_data:/data/acme
      - nginx_logs:/data/logs

secrets:
  manager_tls_cert:
    file: ./secrets/manager.crt
  manager_tls_key:
    file: ./secrets/manager.key
  nginx_manager_master_key:
    file: ./secrets/nginx_manager_master_key

volumes:
  sqlite_data:
  nginx_data:
  certificate_data:
  acme_data:
  nginx_logs:
