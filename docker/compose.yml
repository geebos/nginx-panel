name: nginx-panel-development

services:
  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.development
    environment:
      APP_ENV: development
      DB_ENGINE: sqlite
      DB_SQLITE_DIR: /app/.sqlite
      NEXT_TELEMETRY_DISABLED: "1"
      NGINX_LOG_DIR: /data/logs
      NGINX_RUNTIME_ROOT: /data/nginx
      NGINX_TEMPLATE_FILE: /etc/nginx/nginx.development.conf
      RUNTIME_MODE: nginx-manager
    init: true
    ports:
      - "3000:8080"
      - "8443:8443"
    restart: unless-stopped
    volumes:
      - node_modules:/app/node_modules
      - sqlite_data:/app/.sqlite
      - nginx_data:/data/nginx
      - certificate_data:/data/certs
      - acme_data:/data/acme
      - nginx_logs:/data/logs

volumes:
  node_modules:
  sqlite_data:
  nginx_data:
  certificate_data:
  acme_data:
  nginx_logs:
