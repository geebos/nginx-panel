name: nginx-panel

services:
  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      APP_ENV: production
      DB_ENGINE: sqlite
      DB_SQLITE_DIR: /data/db
      # Optional server IP for remote bootstrap (http://IP).
      BOOTSTRAP_EXTRA_HOSTS: ${BOOTSTRAP_EXTRA_HOSTS:-}
      # Optional migration seed / emergency file cert.
      MANAGER_HOST: ${MANAGER_HOST:-}
      MANAGER_URL: ${MANAGER_URL:-}
      MANAGER_TLS_CERT_FILE: ${MANAGER_TLS_CERT_FILE:-}
      MANAGER_TLS_KEY_FILE: ${MANAGER_TLS_KEY_FILE:-}
      NGINX_LOG_DIR: /data/logs
      NGINX_MANAGER_MASTER_KEY_FILE: /run/secrets/nginx_manager_master_key
      PORT: "8787"
      RUNTIME_MODE: nginx-manager
    ports:
      - "80:8080"
      - "443:8443"
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    stop_grace_period: 30s
    tmpfs:
      - /run/nginx:uid=10001,gid=10001,mode=0750
      - /tmp:uid=10001,gid=10001,mode=1770
    volumes:
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
        bind:
          create_host_path: true
      - sqlite_data:/data/db
      - nginx_data:/data/nginx
      - certificate_data:/data/certs
      - acme_data:/data/acme
      - nginx_logs:/data/logs
      - generated_secrets:/data/secrets

volumes:
  sqlite_data:
  nginx_data:
  certificate_data:
  acme_data:
  nginx_logs:
  generated_secrets:
